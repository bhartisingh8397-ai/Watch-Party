{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <span style="font-size: 3rem;">🔒</span>
            <h1 style="margin-top: 10px;">Private Room</h1>
            <p style="color: var(--text-muted);">{{ room.name }}</p>
        </div>
        <form action="{{ url_for('room_password', room_id=room.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">Room Password</label>
                <input type="password" name="password" placeholder="Enter room password" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Enter Room</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">
            <a href="{{ url_for('index') }}" style="color: var(--text-muted);">← Back to Home</a>
        </p>
    </div>
</section>
{% endblock %}
