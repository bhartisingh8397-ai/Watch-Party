{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="auth-card fade-in">
        <div style="text-align: center; margin-bottom: 24px;">
            <span style="font-size: 2.5rem; display:inline-block; margin-bottom:8px;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
            <h1 style="margin-top: 10px;">Private Room</h1>
            <p class="auth-subtitle" style="color: var(--text-secondary);">{{ room.name }}</p>
        </div>
        <form action="{{ url_for('room_password', room_id=room.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password">Room Password</label>
                <input type="password" name="password" placeholder="Enter the room password" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Enter Room</button>
        </form>
        <p style="text-align: center; margin-top: 16px;">
            <a href="{{ url_for('index') }}" style="color: var(--text-muted); font-size: 0.88rem;">← Back to Home</a>
        </p>
    </div>
</section>
{% endblock %}
