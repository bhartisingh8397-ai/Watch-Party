{% extends "base.html" %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Sign In</h1>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="identifier">Username or Email</label>
                <input type="text" name="identifier" placeholder="Username or Email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        
        <div class="auth-divider">
            <span>OR</span>
        </div>

        <a href="{{ url_for('login_google') }}" class="btn btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" width="18">
            Sign in with Google
        </a>

        <p>New to WatchParty? <a href="{{ url_for('signup') }}">Sign up now.</a></p>
    </div>
</section>
{% endblock %}
